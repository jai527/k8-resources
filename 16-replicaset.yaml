apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: nginx
  # this labels are replicaset labels reference
  labels:
    project: roboshop
    environment: dev
    purpose: rs-demo
    tier: frontend
    component: frontend
spec:
  replicas: 3
  selector:
    # using this labels replica set selects the pod 
    matchLabels:
      project: roboshop
      environment: dev
      purpose: rs-demo
      tier: frontend
      component: frontend
  # this is pod definition, pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        purpose: rs-demo
        tier: frontend
        component: frontend
    spec:
      containers:
      - name: nginx
        image: nginx

