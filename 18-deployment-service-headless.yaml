apiVersion: apps/v1
kind: Deployment

metadata:
  name: app
  namespace: roboshop
  labels:
    project: roboshop
    environment: dev
    tier: frontend
    component: app
spec:
  replicas: 4
  selector:
    matchLabels:
      project: roboshop
      environment: dev
      tier: frontend
      component: app
  template:
    metadata:
      labels:
        project: roboshop
        environment: dev
        tier: frontend
        component: app
    spec:
      containers:
      - name: nginx
        image: nginx:1.15.0
---
apiVersion: v1
kind: Service 
metadata:
  name: app
  namespace: roboshop
spec:
  selector: 
      project: roboshop
      environment: dev
      tier: frontend
      component: app
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: app-headless
  namespace: roboshop
spec:
  clusterIP: None
  selector:
    project: roboshop
    environment: dev
    tier: frontend
    component: app
  ports:
    - port: 80
      targetPort: 80



