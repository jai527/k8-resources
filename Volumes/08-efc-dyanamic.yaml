apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: efs-dynamic
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: efs-sc
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: nginx
spec: 
  containers:
    - name: nginx
      image: nginx
      volumeMounts:
        - name: Persistent-storage
          mountPath: /data
  nodeSelector:
    topology.kubernetes.io/zone: us-east-1b

  volumes:
    - name: Persistent-storage
      persistentVolumeClaim:
        claimName: efs-dynamic